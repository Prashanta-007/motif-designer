<!DOCTYPE html>
<html>
<head>
<title>Motif Designer</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

button{
padding:10px;
margin:5px;
cursor:pointer;
}

#homeScreen button{
display:block;
width:250px;
margin:15px auto;
}

#editorScreen,#libraryScreen,#savedScreen{
display:none;
}

#grid{
display:grid;
grid-template-columns:repeat(16,30px);
grid-template-rows:repeat(16,30px);
justify-content:center;
gap:1px;
margin:20px;
}

.cell{
width:30px;
height:30px;
background:white;
border:1px solid #ccc;
}

.colors{
display:flex;
justify-content:center;
gap:10px;
}

.color-btn{
width:35px;
height:35px;
border:2px solid gray;
}

.active{
border:3px solid orange;
}
</style>

</head>

<body>

<!-- HOME -->
<div id="homeScreen">
<h1>Motif Designer</h1>

<button onclick="openEditor()">Create New Design</button>
<button onclick="openLibrary()">Motif Library</button>
<button onclick="openSaved()">Saved Designs</button>
</div>

<!-- EDITOR -->
<div id="editorScreen">

<h2>Editor</h2>

<div class="colors">
<button class="color-btn active" style="background:black" onclick="setColor('black')"></button>
<button class="color-btn" style="background:red" onclick="setColor('red')"></button>
<button class="color-btn" style="background:blue" onclick="setColor('blue')"></button>
<button class="color-btn" style="background:green" onclick="setColor('green')"></button>
<button class="color-btn" style="background:yellow" onclick="setColor('yellow')"></button>
</div>

<button onclick="tool='draw'">Draw</button>
<button onclick="tool='erase'">Erase</button>
<button onclick="clearGrid()">Clear</button>

<button onclick="goHome()">Home</button>

<div id="grid"></div>

<h3>Price ₹<span id="price">50</span></h3>

</div>

<!-- LIBRARY -->
<div id="libraryScreen">

<h2>Motif Library</h2>

<h3>🌸 Flower</h3>
<button onclick="loadMotif('flower')">Load Flower</button>

<h3>♦ Diamond</h3>
<button onclick="loadMotif('diamond')">Load Diamond</button>

<h3>🟩 Border</h3>
<button onclick="loadMotif('border')">Load Border</button>

<br>
<button onclick="goHome()">Back</button>

</div>

<!-- SAVED -->
<div id="savedScreen">
<h2>Saved</h2>
<button onclick="goHome()">Back</button>
</div>

<script>

let tool="draw";
let color="black";

const grid=document.getElementById("grid");

// CREATE GRID
for(let i=0;i<256;i++){
let cell=document.createElement("div");
cell.className="cell";

cell.onclick=()=>{
if(tool==="draw"){
cell.style.background=color;
}else{
cell.style.background="white";
}
updatePrice();
};

grid.appendChild(cell);
}

// NAVIGATION
function openEditor(){
hideAll();
editorScreen.style.display="block";
}

function openLibrary(){
hideAll();
libraryScreen.style.display="block";
}

function openSaved(){
hideAll();
savedScreen.style.display="block";
}

function goHome(){
hideAll();
homeScreen.style.display="block";
}

function hideAll(){
homeScreen.style.display="none";
editorScreen.style.display="none";
libraryScreen.style.display="none";
savedScreen.style.display="none";
}

// COLOR
function setColor(c){
color=c;
}

// CLEAR
function clearGrid(){
document.querySelectorAll(".cell").forEach(c=>{
c.style.background="white";
});
updatePrice();
}

// PRICE
function updatePrice(){
let filled=0;
let colors=new Set();

document.querySelectorAll(".cell").forEach(c=>{
if(c.style.background && c.style.background!=="white"){
filled++;
colors.add(c.style.background);
}
});

document.getElementById("price").innerText =
50 + colors.size*20 + filled*2;
}

// ---------------- PRESET MOTIFS ----------------

function loadMotif(type){

openEditor();
clearGrid();

function p(r,c,col){
document.querySelectorAll(".cell")[r*16+c].style.background=col;
}

// 🌸 FLOWER
if(type==="flower"){

let f=[
[7,7],

[6,7],[8,7],[7,6],[7,8],

[6,6],[6,8],[8,6],[8,8]
];

f.forEach(x=>p(x[0],x[1],"red"));
}

// ♦ DIAMOND
if(type==="diamond"){

let d=[
[4,7],

[5,6],[5,7],[5,8],

[6,5],[6,6],[6,7],[6,8],[6,9],

[7,4],[7,5],[7,6],[7,7],[7,8],[7,9],[7,10],

[8,5],[8,6],[8,7],[8,8],[8,9],

[9,6],[9,7],[9,8],

[10,7]
];

d.forEach(x=>p(x[0],x[1],"blue"));
}

// 🟩 BORDER
if(type==="border"){

for(let r=0;r<16;r++){
for(let c=0;c<16;c++){
if(r===0||r===15||c===0||c===15){
p(r,c,"green");
}
}
}
}

updatePrice();
}

</script>

</body>
</html>
